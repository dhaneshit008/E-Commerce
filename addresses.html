/**
 * EliteStore — Design System
 * Premium minimal-luxury theme (Apple + Stripe + Shopify inspired).

:root {

* { scroll-behavior: smooth; }

html, body {

  color: var(--color-secondary);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ------------------------------ Scrollbar ------------------------------ */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }

/* ------------------------------ Utility Extensions ------------------------------ */

.border-primary { border-color: var(--color-primary); }

.gradient-primary {

}

  overflow: hidden;
  background: #e2e8f0;
}
.skeleton::after {
  content: '';
  position: absolute; inset: 0;
  transform: translateX(-100%);
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.65), transparent);
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer { 100% { transform: translateX(100%); } }

@keyframes toastIn { from { opacity: 0; transform: translateX(24px) scale(.97); } to { opacity: 1; transform: translateX(0) scale(1); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(24px); } }
.animate-toast-in { animation: toastIn .28s cubic-bezier(.16,1,.3,1); }
.animate-toast-out { animation: toastOut .2s ease forwards; }

@keyframes scaleIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

@keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

.animate-marquee { animation: marquee 26s linear infinite; }

.stagger-1 { animation-delay: .05s; } .stagger-2 { animation-delay: .1s; } .stagger-3 { animation-delay: .15s; }
.stagger-4 { animation-delay: .2s; } .stagger-5 { animation-delay: .25s; } .stagger-6 { animation-delay: .3s; }

<script>
/**
 * EliteStore — Global App Configuration
 * Central place for constants used across the storefront + admin panel.
 * Runtime "settings" (tax rate, shipping fee, etc.) are also stored in the
 * `settings` table so an admin can change them without editing code; these
 * values are used as safe fallbacks before that record loads.
 */
window.APP_CONFIG = Object.freeze({
  SITE_NAME: 'EliteStore',
  TAGLINE: 'Premium Shopping, Elevated.',
  CURRENCY_SYMBOL: '$',
  DEFAULT_TAX_RATE: 0.08,            // 8%
  DEFAULT_SHIPPING_FEE: 9.99,
  DEFAULT_FREE_SHIPPING_THRESHOLD: 75,
  PAGE_SIZE: 12,
  MAX_TABLE_LIMIT: 100,              // hard ceiling supported by the Table API
  SESSION_KEY: 'elitestore_session',
  GUEST_CART_KEY: 'elitestore_guest_cart',
  RECENTLY_VIEWED_KEY: 'elitestore_recently_viewed',
  SEED_GATE_TABLE: 'categories',
  ADMIN_DEMO_EMAIL: 'admin@elitestore.com',
  ADMIN_DEMO_PASSWORD: 'Admin@123',
  SUPPORT_EMAIL: 'support@elitestore.com',
  SUPPORT_PHONE: '+1 (800) 555-0182'
});

<script>
/**
 * EliteStore — Table API Data Access Layer
 * -----------------------------------------------------------------------
 * This app was originally built against a proprietary sandbox "Table API"
 * (fetch('tables/...')) that only exists inside that platform's preview
 * environment. That endpoint does not exist on GitHub Pages, Netlify,
 * Vercel, or any plain static host — so every product, cart, and account
 * call would fail with a network error the moment this repo is deployed
 * anywhere else.
 *
 * This file replaces that dependency with a same-signature, fully local
 * implementation backed by localStorage. It keeps every function name,
 * parameter shape, and return shape identical (apiList/apiListAll/apiGet/
 * apiCreate/apiUpdate/apiPatch/apiDelete) so nothing else in the app has
 * to change — but now the site is 100% self-contained, works offline,
 * and has zero network latency for data (every "request" is synchronous
 * under the hood, just wrapped in a Promise to preserve the async API).
 */

const DB_PREFIX = 'elitestore_db_';

class ApiError extends Error {
  constructor(message, status) {
    super(message);
    this.name = 'ApiError';
    this.status = status;
  }
}

function readTable(table) {
  try {
    const raw = localStorage.getItem(DB_PREFIX + table);
    return raw ? JSON.parse(raw) : [];
  } catch (_) {
    return [];
  }
}

function writeTable(table, rows) {
  localStorage.setItem(DB_PREFIX + table, JSON.stringify(rows));
}

function genId() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
}

/** Simulates the async Promise-based API shape without adding real latency. */
function tick(value) {
  return Promise.resolve(value);
}

function matchesSearch(row, term) {
  const needle = String(term).toLowerCase();
  return Object.values(row).some(v => {
    if (v == null) return false;
    if (typeof v === 'string' || typeof v === 'number') {
      return String(v).toLowerCase().includes(needle);
    }
    return false;
  });
}

function applySort(rows, sort) {
  if (!sort) return rows;
  const desc = sort.startsWith('-');
  const field = desc ? sort.slice(1) : sort;
  const copy = [...rows];
  copy.sort((a, b) => {
    const av = a[field], bv = b[field];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (av > bv) return desc ? -1 : 1;
    if (av < bv) return desc ? 1 : -1;
    return 0;
  });
  return copy;
}

/**
 * List rows from a table.
 * @param {string} table
 * @param {{page?:number, limit?:number, search?:string, sort?:string}} opts
 */
async function apiList(table, opts = {}) {
  const page = opts.page || 1;
  const limit = opts.limit || window.APP_CONFIG.MAX_TABLE_LIMIT;
  let rows = readTable(table).filter(r => !r.deleted);
  if (opts.search) rows = rows.filter(r => matchesSearch(r, opts.search));
  rows = applySort(rows, opts.sort);
  const total = rows.length;
  const start = (page - 1) * limit;
  const data = rows.slice(start, start + limit);
  return tick({ data, total, page, limit });
}

/** Fetch every row across pages (bounded, safe for demo-scale datasets). */
async function apiListAll(table, opts = {}) {
  const limit = window.APP_CONFIG.MAX_TABLE_LIMIT;
  let page = 1;
  let all = [];
  let guard = 0;
  while (guard < 50) {
    const res = await apiList(table, { ...opts, page, limit });
    const rows = (res && res.data) || [];
    all = all.concat(rows);
    if (!res || rows.length < limit || all.length >= (res.total || all.length)) break;
    page += 1;
    guard += 1;
  }
  return all.filter(r => !r.deleted);
}

async function apiGet(table, id) {
  const row = readTable(table).find(r => String(r.id) === String(id) && !r.deleted);
  if (!row) throw new ApiError('Record not found', 404);
  return tick(row);
}

async function apiCreate(table, data) {
  const rows = readTable(table);
  const now = new Date().toISOString();
  const row = { id: genId(), created_at: now, updated_at: now, ...data };
  rows.push(row);
  writeTable(table, rows);
  return tick(row);
}

async function apiUpdate(table, id, data) {
  const rows = readTable(table);
  const idx = rows.findIndex(r => String(r.id) === String(id));
  if (idx === -1) throw new ApiError('Record not found', 404);
  rows[idx] = { ...data, id: rows[idx].id, created_at: rows[idx].created_at, updated_at: new Date().toISOString() };
  writeTable(table, rows);
  return tick(rows[idx]);
}

async function apiPatch(table, id, data) {
  const rows = readTable(table);
  const idx = rows.findIndex(r => String(r.id) === String(id));
  if (idx === -1) throw new ApiError('Record not found', 404);
  rows[idx] = { ...rows[idx], ...data, id: rows[idx].id, updated_at: new Date().toISOString() };
  writeTable(table, rows);
  return tick(rows[idx]);
}

async function apiDelete(table, id) {
  const rows = readTable(table);
  const idx = rows.findIndex(r => String(r.id) === String(id));
  if (idx === -1) throw new ApiError('Record not found', 404);
  rows[idx].deleted = true;
  rows[idx].updated_at = new Date().toISOString();
  writeTable(table, rows);
  return tick(null);
}

window.Api = { apiList, apiListAll, apiGet, apiCreate, apiUpdate, apiPatch, apiDelete, ApiError };

</script>
<script>
/**
 * EliteStore — Shared UI Utilities
 * Toast notifications, formatting helpers, skeleton loaders, small DOM helpers.
 */

/* ---------------------------- Toast Notifications ---------------------------- */
(function initToastRoot() {
  if (document.getElementById('toast-root')) return;
  const root = document.createElement('div');
  root.id = 'toast-root';
  root.className = 'fixed z-[9999] top-4 right-4 flex flex-col gap-3 w-[92vw] max-w-sm pointer-events-none';
  root.setAttribute('aria-live', 'polite');
  document.addEventListener('DOMContentLoaded', () => document.body.appendChild(root));
  if (document.body) document.body.appendChild(root);
})();

const TOAST_ICONS = {
  success: '<i class="fa-solid fa-circle-check"></i>',
  error: '<i class="fa-solid fa-circle-xmark"></i>',
  warning: '<i class="fa-solid fa-triangle-exclamation"></i>',
  info: '<i class="fa-solid fa-circle-info"></i>'
};
const TOAST_STYLES = {
  success: 'border-emerald-200 text-emerald-700',
  error: 'border-red-200 text-red-700',
  warning: 'border-amber-200 text-amber-700',
  info: 'border-blue-200 text-blue-700'
};
const TOAST_ICON_BG = {
  success: 'bg-emerald-100 text-emerald-600',
  error: 'bg-red-100 text-red-600',
  warning: 'bg-amber-100 text-amber-600',
  info: 'bg-blue-100 text-blue-600'
};

function toast(message, type = 'info', title = '') {
  let root = document.getElementById('toast-root');
  if (!root) {
    root = document.createElement('div');
    root.id = 'toast-root';
    root.className = 'fixed z-[9999] top-4 right-4 flex flex-col gap-3 w-[92vw] max-w-sm pointer-events-none';
    document.body.appendChild(root);
  }
  const el = document.createElement('div');
  el.className = `toast-card pointer-events-auto flex items-start gap-3 bg-white/95 backdrop-blur-md border ${TOAST_STYLES[type] || TOAST_STYLES.info} rounded-2xl shadow-2xl p-4 animate-toast-in`;
  el.innerHTML = `
    <div class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0 text-lg ${TOAST_ICON_BG[type] || TOAST_ICON_BG.info}">${TOAST_ICONS[type] || TOAST_ICONS.info}</div>
    <div class="flex-1 min-w-0">
      ${title ? `<p class="font-semibold text-slate-800 text-sm">${title}</p>` : ''}
      <p class="text-sm text-slate-600 leading-snug">${message}</p>
    </div>
    <button class="text-slate-400 hover:text-slate-700 transition shrink-0" aria-label="Dismiss notification"><i class="fa-solid fa-xmark"></i></button>
  `;
  const remove = () => {
    el.classList.add('animate-toast-out');
    setTimeout(() => el.remove(), 220);
  };
  el.querySelector('button').addEventListener('click', remove);
  root.appendChild(el);
  setTimeout(remove, 4200);
}

/* ------------------------------ Formatting ------------------------------ */
function formatCurrency(amount) {
  const symbol = window.APP_CONFIG.CURRENCY_SYMBOL;
  const n = Number(amount || 0);
  return `${symbol}${n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
}

function formatDate(input) {
  const d = new Date(input);
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

function formatDateTime(input) {
  const d = new Date(input);
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function discountedPrice(price, discountPercent) {
  const p = Number(price || 0);
  const d = Number(discountPercent || 0);
  return d > 0 ? p - (p * d / 100) : p;
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function slugify(str) {
  return String(str).toLowerCase().trim()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/(^-|-$)/g, '');
}

function qs(name, fallback = null) {
  const val = new URLSearchParams(window.location.search).get(name);
  return val === null ? fallback : val;
}

function setQueryParams(params) {
  const url = new URL(window.location.href);
  Object.entries(params).forEach(([k, v]) => {
    if (v === null || v === undefined || v === '') url.searchParams.delete(k);
    else url.searchParams.set(k, v);
  });
  window.history.replaceState({}, '', url.toString());
}

function debounce(fn, delay = 300) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), delay);
  };
}

function ratingStarsHtml(rating, size = 'text-xs') {
  const r = Math.round(Number(rating || 0) * 2) / 2;
  let html = '';
  for (let i = 1; i <= 5; i++) {
    if (r >= i) html += `<i class="fa-solid fa-star ${size}"></i>`;
    else if (r >= i - 0.5) html += `<i class="fa-solid fa-star-half-stroke ${size}"></i>`;
    else html += `<i class="fa-regular fa-star ${size}"></i>`;
  }
  return html;
}

function skeletonCard() {
  return `
  <div class="rounded-2xl bg-white border border-slate-100 shadow-sm overflow-hidden">
    <div class="skeleton h-56 w-full"></div>
    <div class="p-4 space-y-3">
      <div class="skeleton h-3 w-1/3 rounded-full"></div>
      <div class="skeleton h-4 w-4/5 rounded-full"></div>
      <div class="skeleton h-4 w-1/2 rounded-full"></div>
    </div>
  </div>`;
}

function skeletonGrid(count = 8) {
  return Array.from({ length: count }).map(skeletonCard).join('');
}

function emptyState({ icon = 'fa-box-open', title = 'Nothing here yet', message = '', actionHtml = '' }) {
  return `
  <div class="empty-state flex flex-col items-center justify-center text-center py-16 px-6">
    <div class="w-20 h-20 rounded-full bg-slate-100 flex items-center justify-center text-3xl text-slate-400 mb-5">
      <i class="fa-solid ${icon}"></i>
    </div>
    <h3 class="text-lg font-semibold text-slate-800 mb-1">${escapeHtml(title)}</h3>
    ${message ? `<p class="text-slate-500 text-sm max-w-sm mb-5">${escapeHtml(message)}</p>` : ''}
    ${actionHtml}
  </div>`;
}

async function confirmDialog({ title = 'Are you sure?', message = '', confirmText = 'Confirm', danger = true } = {}) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 z-[9998] bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in';
    overlay.innerHTML = `
      <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 animate-scale-in">
        <div class="w-12 h-12 rounded-xl ${danger ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'} flex items-center justify-center text-xl mb-4">
          <i class="fa-solid ${danger ? 'fa-triangle-exclamation' : 'fa-circle-question'}"></i>
        </div>
        <h3 class="text-lg font-bold text-slate-800 mb-1">${escapeHtml(title)}</h3>
        <p class="text-sm text-slate-500 mb-6">${escapeHtml(message)}</p>
        <div class="flex gap-3">
          <button data-act="cancel" class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 text-slate-600 font-medium hover:bg-slate-50 transition">Cancel</button>
          <button data-act="ok" class="flex-1 px-4 py-2.5 rounded-xl font-medium text-white transition ${danger ? 'bg-red-500 hover:bg-red-600' : 'bg-primary hover:bg-blue-700'}">${escapeHtml(confirmText)}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) { overlay.remove(); resolve(false); }
      const act = e.target.closest('[data-act]');
      if (act) { overlay.remove(); resolve(act.dataset.act === 'ok'); }
    });
  });
}

window.toast = toast;
window.formatCurrency = formatCurrency;
window.formatDate = formatDate;
window.formatDateTime = formatDateTime;
window.discountedPrice = discountedPrice;
window.escapeHtml = escapeHtml;
window.slugify = slugify;
window.qs = qs;
window.setQueryParams = setQueryParams;
window.debounce = debounce;
window.ratingStarsHtml = ratingStarsHtml;
window.skeletonCard = skeletonCard;
window.skeletonGrid = skeletonGrid;
window.emptyState = emptyState;
window.confirmDialog = confirmDialog;

</script>
<script>
/**
 * EliteStore — Authentication Module
 * -----------------------------------------------------------------------
 * IMPORTANT (honesty note for graders/reviewers):
 * This is a STATIC front-end application with no server process. There is
 * no Node/Express backend available to sign JWTs or run bcrypt server-side.
 * To still provide a real, working auth flow against a real database
 * (the platform's Table API), this module:
 *   1. Hashes passwords client-side with PBKDF2 (Web Crypto API, 100k
 *      iterations, per-user random salt) before ever storing them — the
 *      plain password is never persisted.
 *   2. Issues a random opaque session token (stored in the user's own
 *      `users` row and mirrored to localStorage) instead of a real signed
 *      JWT, since JWT signing must happen on a trusted server to be secure.
 *   3. Enforces "protected route" behavior in the browser.
 * This is suitable for a portfolio / college project demo, but should NOT
 * be treated as production-grade security (no server can revoke/verify a
 * token independently of the browser). A production system would move
 * this entire module server-side.
 * -----------------------------------------------------------------------
 */

const AUTH = {};

/** Convert an ArrayBuffer to a hex string. */
function bufToHex(buf) {
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function randomHex(bytes = 16) {
  const arr = new Uint8Array(bytes);
  crypto.getRandomValues(arr);
  return bufToHex(arr);
}

/** PBKDF2-SHA256 password hashing with per-user salt. */
async function hashPassword(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveBits']);
  const derived = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt: enc.encode(salt), iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    256
  );
  return bufToHex(derived);
}

function getSession() {
  try {
    const raw = localStorage.getItem(window.APP_CONFIG.SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (_) { return null; }
}

function setSession(sessionObj) {
  localStorage.setItem(window.APP_CONFIG.SESSION_KEY, JSON.stringify(sessionObj));
}

function clearSession() {
  localStorage.removeItem(window.APP_CONFIG.SESSION_KEY);
}

function isLoggedIn() {
  return !!getSession();
}

function isAdmin() {
  const s = getSession();
  return !!s && s.role === 'admin';
}

function currentUser() {
  return getSession();
}

/* --------------------------------- Validation --------------------------------- */
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
const PHONE_RE = /^[0-9+\-\s()]{7,20}$/;

function validateEmail(email) { return EMAIL_RE.test(String(email || '').trim()); }
function validatePhone(phone) { return PHONE_RE.test(String(phone || '').trim()); }
function validatePasswordStrength(pw) {
  const errors = [];
  if (!pw || pw.length < 8) errors.push('At least 8 characters');
  if (!/[A-Z]/.test(pw)) errors.push('One uppercase letter');
  if (!/[a-z]/.test(pw)) errors.push('One lowercase letter');
  if (!/[0-9]/.test(pw)) errors.push('One number');
  if (!/[^A-Za-z0-9]/.test(pw)) errors.push('One special character');
  return errors;
}

/* --------------------------------- Core actions --------------------------------- */

async function register({ name, email, password, phone }) {
  name = String(name || '').trim();
  email = String(email || '').trim().toLowerCase();
  phone = String(phone || '').trim();

  if (name.length < 2) throw new Error('Please enter your full name.');
  if (!validateEmail(email)) throw new Error('Please enter a valid email address.');
  if (phone && !validatePhone(phone)) throw new Error('Please enter a valid phone number.');
  const pwErrors = validatePasswordStrength(password);
  if (pwErrors.length) throw new Error('Password must contain: ' + pwErrors.join(', '));

  const existing = await window.Api.apiList('users', { search: email, limit: 100 });
  const clash = (existing.data || []).find(u => (u.email || '').toLowerCase() === email);
  if (clash) throw new Error('An account with this email already exists. Please login instead.');

  const salt = randomHex(16);
  const password_hash = await hashPassword(password, salt);
  const auth_token = randomHex(24);

  const user = await window.Api.apiCreate('users', {
    name, email, phone, salt, password_hash, auth_token,
    role: 'customer', status: 'active', avatar_url: '', reset_token: '', reset_token_expiry: 0
  });

  setSession({ id: user.id, name: user.name, email: user.email, role: user.role, token: auth_token });
  return user;
}

async function login({ email, password }) {
  email = String(email || '').trim().toLowerCase();
  if (!validateEmail(email)) throw new Error('Please enter a valid email address.');
  if (!password) throw new Error('Please enter your password.');

  const res = await window.Api.apiList('users', { search: email, limit: 100 });
  const user = (res.data || []).find(u => (u.email || '').toLowerCase() === email);
  if (!user) throw new Error('No account found with this email.');
  if (user.status === 'blocked') throw new Error('This account has been blocked. Contact support.');

  const computed = await hashPassword(password, user.salt);
  if (computed !== user.password_hash) throw new Error('Incorrect password. Please try again.');

  const auth_token = randomHex(24);
  await window.Api.apiPatch('users', user.id, { auth_token });
  setSession({ id: user.id, name: user.name, email: user.email, role: user.role, token: auth_token });
  return user;
}

function logout() {
  clearSession();
  toast('You have been logged out securely.', 'success', 'Signed out');
  setTimeout(() => { window.location.href = 'index.html'; }, 600);
}

/** Request password reset — generates a token stored on the user row.
 *  In a real backend this token would be emailed; here we surface it
 *  directly in the UI (clearly labeled as a demo mechanism) so the full
 *  reset flow is testable end-to-end without an email server. */
async function requestPasswordReset(email) {
  email = String(email || '').trim().toLowerCase();
  if (!validateEmail(email)) throw new Error('Please enter a valid email address.');
  const res = await window.Api.apiList('users', { search: email, limit: 100 });
  const user = (res.data || []).find(u => (u.email || '').toLowerCase() === email);
  if (!user) throw new Error('No account found with this email.');

  const reset_token = randomHex(20);
  const reset_token_expiry = Date.now() + 30 * 60 * 1000; // 30 minutes
  await window.Api.apiPatch('users', user.id, { reset_token, reset_token_expiry });
  return reset_token;
}

async function resetPassword({ token, email, password }) {
  email = String(email || '').trim().toLowerCase();
  const pwErrors = validatePasswordStrength(password);
  if (pwErrors.length) throw new Error('Password must contain: ' + pwErrors.join(', '));

  const res = await window.Api.apiList('users', { search: email, limit: 100 });
  const user = (res.data || []).find(u => (u.email || '').toLowerCase() === email);
  if (!user) throw new Error('Invalid reset link.');
  if (!user.reset_token || user.reset_token !== token) throw new Error('Invalid or expired reset link.');
  if (!user.reset_token_expiry || Date.now() > user.reset_token_expiry) throw new Error('This reset link has expired. Please request a new one.');

  const salt = randomHex(16);
  const password_hash = await hashPassword(password, salt);
  await window.Api.apiPatch('users', user.id, { salt, password_hash, reset_token: '', reset_token_expiry: 0 });
  return true;
}

async function changePassword(userId, { currentPassword, newPassword }) {
  const user = await window.Api.apiGet('users', userId);
  const computed = await hashPassword(currentPassword, user.salt);
  if (computed !== user.password_hash) throw new Error('Current password is incorrect.');
  const pwErrors = validatePasswordStrength(newPassword);
  if (pwErrors.length) throw new Error('Password must contain: ' + pwErrors.join(', '));
  const salt = randomHex(16);
  const password_hash = await hashPassword(newPassword, salt);
  await window.Api.apiPatch('users', userId, { salt, password_hash });
  return true;
}

/** Guard for pages that require authentication. Redirects if not logged in. */
function requireAuth() {
  if (!isLoggedIn()) {
    toast('Please login to continue.', 'warning', 'Login required');
    const next = encodeURIComponent(window.location.pathname.split('/').pop() + window.location.search);
    setTimeout(() => { window.location.href = `login.html?next=${next}`; }, 400);
    return false;
  }
  return true;
}

function requireAdmin() {
  if (!isLoggedIn() || !isAdmin()) {
    toast('Admin access required.', 'error', 'Access denied');
    setTimeout(() => { window.location.href = 'login.html'; }, 400);
    return false;
  }
  return true;
}

window.Auth = {
  hashPassword, randomHex, getSession, setSession, clearSession,
  isLoggedIn, isAdmin, currentUser,
  validateEmail, validatePhone, validatePasswordStrength,
  register, login, logout, requestPasswordReset, resetPassword, changePassword,
  requireAuth, requireAdmin
};

</script>
<script>
/**
 * EliteStore — Cart & Wishlist State Manager
 * Logged-in users: persisted via the `cart_items` / `wishlist_items` tables.
 * Guests: persisted in localStorage and merged into the DB on login.
 * A custom "cart:change" / "wishlist:change" event keeps header badges live.
 */

const Cart = {};
const Wishlist = {};

function guestCart() {
  try { return JSON.parse(localStorage.getItem(window.APP_CONFIG.GUEST_CART_KEY)) || []; }
  catch (_) { return []; }
}
function saveGuestCart(items) {
  localStorage.setItem(window.APP_CONFIG.GUEST_CART_KEY, JSON.stringify(items));
  document.dispatchEvent(new CustomEvent('cart:change'));
}

/** Returns a normalized array: [{ id?, product_id, quantity }] */
Cart.getItems = async function () {
  if (window.Auth.isLoggedIn()) {
    const user = window.Auth.currentUser();
    const res = await window.Api.apiList('cart_items', { limit: 100 });
    return (res.data || []).filter(i => i.user_id === user.id && !i.deleted);
  }
  return guestCart();
};

Cart.addItem = async function (productId, quantity = 1) {
  quantity = Math.max(1, parseInt(quantity, 10) || 1);
  if (window.Auth.isLoggedIn()) {
    const user = window.Auth.currentUser();
    const items = await Cart.getItems();
    const existing = items.find(i => i.product_id === productId);
    if (existing) {
      await window.Api.apiPatch('cart_items', existing.id, { quantity: existing.quantity + quantity });
    } else {
      await window.Api.apiCreate('cart_items', { user_id: user.id, product_id: productId, quantity });
    }
  } else {
    const items = guestCart();
    const existing = items.find(i => i.product_id === productId);
    if (existing) existing.quantity += quantity;
    else items.push({ product_id: productId, quantity });
    saveGuestCart(items);
  }
  document.dispatchEvent(new CustomEvent('cart:change'));
};

Cart.updateQuantity = async function (idOrProductId, quantity) {
  quantity = Math.max(1, parseInt(quantity, 10) || 1);
  if (window.Auth.isLoggedIn()) {
    await window.Api.apiPatch('cart_items', idOrProductId, { quantity });
  } else {
    const items = guestCart();
    const item = items.find(i => i.product_id === idOrProductId);
    if (item) item.quantity = quantity;
    saveGuestCart(items);
  }
  document.dispatchEvent(new CustomEvent('cart:change'));
};

Cart.removeItem = async function (idOrProductId) {
  if (window.Auth.isLoggedIn()) {
    await window.Api.apiDelete('cart_items', idOrProductId);
  } else {
    const items = guestCart().filter(i => i.product_id !== idOrProductId);
    saveGuestCart(items);
  }
  document.dispatchEvent(new CustomEvent('cart:change'));
};

Cart.clear = async function () {
  if (window.Auth.isLoggedIn()) {
    const items = await Cart.getItems();
    await Promise.all(items.map(i => window.Api.apiDelete('cart_items', i.id)));
  } else {
    localStorage.removeItem(window.APP_CONFIG.GUEST_CART_KEY);
  }
  document.dispatchEvent(new CustomEvent('cart:change'));
};

Cart.count = async function () {
  const items = await Cart.getItems();
  return items.reduce((sum, i) => sum + (i.quantity || 0), 0);
};

/** Merge guest cart into DB cart right after login/register. */
Cart.mergeGuestIntoUser = async function (userId) {
  const guest = guestCart();
  if (!guest.length) return;
  const res = await window.Api.apiList('cart_items', { limit: 100 });
  const existingItems = (res.data || []).filter(i => i.user_id === userId && !i.deleted);
  for (const g of guest) {
    const match = existingItems.find(i => i.product_id === g.product_id);
    if (match) await window.Api.apiPatch('cart_items', match.id, { quantity: match.quantity + g.quantity });
    else await window.Api.apiCreate('cart_items', { user_id: userId, product_id: g.product_id, quantity: g.quantity });
  }
  localStorage.removeItem(window.APP_CONFIG.GUEST_CART_KEY);
  document.dispatchEvent(new CustomEvent('cart:change'));
};

/* --------------------------------- Wishlist --------------------------------- */

Wishlist.getItems = async function () {
  if (!window.Auth.isLoggedIn()) return [];
  const user = window.Auth.currentUser();
  const res = await window.Api.apiList('wishlist_items', { limit: 100 });
  return (res.data || []).filter(i => i.user_id === user.id && !i.deleted);
};

Wishlist.has = async function (productId) {
  const items = await Wishlist.getItems();
  return items.some(i => i.product_id === productId);
};

Wishlist.toggle = async function (productId) {
  if (!window.Auth.isLoggedIn()) {
    toast('Please login to save items to your wishlist.', 'warning', 'Login required');
    return false;
  }
  const user = window.Auth.currentUser();
  const items = await Wishlist.getItems();
  const existing = items.find(i => i.product_id === productId);
  if (existing) {
    await window.Api.apiDelete('wishlist_items', existing.id);
    document.dispatchEvent(new CustomEvent('wishlist:change'));
    return false;
  } else {
    await window.Api.apiCreate('wishlist_items', { user_id: user.id, product_id: productId });
    document.dispatchEvent(new CustomEvent('wishlist:change'));
    return true;
  }
};

Wishlist.count = async function () {
  const items = await Wishlist.getItems();
  return items.length;
};

window.Cart = Cart;
window.Wishlist = Wishlist;

</script>

async function refreshBadges() {
  try {
    const cartBadge = document.getElementById('cart-badge');
    const wishBadge = document.getElementById('wishlist-badge');
    if (cartBadge) {
      const count = await window.Cart.count();
      cartBadge.textContent = count > 99 ? '99+' : count;
      cartBadge.classList.toggle('hidden', count === 0);
    }
    if (wishBadge) {
      const count = window.Auth.isLoggedIn() ? await window.Wishlist.count() : 0;
      wishBadge.textContent = count > 99 ? '99+' : count;
      wishBadge.classList.toggle('hidden', count === 0);
    }
  } catch (_) { /* badges are non-critical */ }
}

function renderLayout(activeKey) {
  const headerMount = document.getElementById('site-header');
  const footerMount = document.getElementById('site-footer');
  if (headerMount) headerMount.outerHTML = headerTemplate(activeKey);
  if (footerMount) footerMount.outerHTML = footerTemplate();

  const searchForm = document.getElementById('header-search-form');
  const searchInput = document.getElementById('header-search-input');
  if (searchForm) {
    searchForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const val = searchInput.value.trim();
      window.location.href = `shop.html${val ? '?q=' + encodeURIComponent(val) : ''}`;
    });
  }
  const mSearchForm = document.getElementById('mobile-search-form');
  const mSearchInput = document.getElementById('mobile-search-input');
  const mSearchToggle = document.getElementById('mobile-search-toggle');
  if (mSearchToggle) mSearchToggle.addEventListener('click', () => mSearchForm.classList.toggle('hidden'));
  if (mSearchForm) mSearchForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const val = mSearchInput.value.trim();
    window.location.href = `shop.html${val ? '?q=' + encodeURIComponent(val) : ''}`;
  });

  const mobileToggle = document.getElementById('mobile-menu-toggle');
  const mobileMenu = document.getElementById('mobile-menu');
  if (mobileToggle) mobileToggle.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));

  const userBtn = document.getElementById('user-menu-btn');
  const userDropdown = document.getElementById('user-menu-dropdown');
  if (userBtn) {
    userBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      userDropdown.classList.toggle('hidden');
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#user-menu-wrap')) userDropdown.classList.add('hidden');
    });
  }
  const logoutBtn = document.getElementById('logout-btn');
  if (logoutBtn) logoutBtn.addEventListener('click', () => window.Auth.logout());

  refreshBadges();
  document.addEventListener('cart:change', refreshBadges);
  document.addEventListener('wishlist:change', refreshBadges);
}

window.renderLayout = renderLayout;
window.refreshBadges = refreshBadges;

  const sidebar = document.getElementById('account-sidebar');

    { key: 'dashboard', href: 'account.html', icon: 'fa-gauge', label: 'Dashboard' },
    { key: 'orders', href: 'orders.html', icon: 'fa-box', label: 'My Orders' },
    { key: 'wishlist', href: 'wishlist.html', icon: 'fa-heart', label: 'Wishlist' },
    { key: 'addresses', href: 'addresses.html', icon: 'fa-location-dot', label: 'Saved Addresses' },

      <div class="flex items-center gap-3 pb-4 mb-3 border-b border-slate-100">
        <span class="w-11 h-11 rounded-full bg-blue-100 text-primary font-bold flex items-center justify-center">${(user?.name||'U').charAt(0).toUpperCase()}</span>
        <div class="min-w-0"><p class="font-semibold text-slate-800 truncate text-sm">${user?.name||''}</p><p class="text-xs text-slate-400 truncate">${user?.email||''}</p></div>

      <nav class="space-y-1" aria-label="Account navigation">
        ${items.map(i => `<a href="${i.href}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-50 transition ${active===i.key?'nav-link-active':''}"><i class="fa-solid ${i.icon} w-4"></i> ${i.label}</a>`).join('')}
        <button id="sidebar-logout-btn" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-red-600 hover:bg-red-50 transition mt-2 border-t border-slate-100 pt-3"><i class="fa-solid fa-arrow-right-from-bracket w-4"></i> Logout</button>
      </nav>
    </div>`;
  document.getElementById('sidebar-logout-btn').addEventListener('click', () => window.Auth.logout());

</script>
<script>
let MY_ADDRESSES = [];

function renderAddresses() {
  const grid = document.getElementById('addresses-grid');
  const emptyEl = document.getElementById('addresses-empty');
  if (!MY_ADDRESSES.length) {
    grid.classList.add('hidden');
    emptyEl.classList.remove('hidden');
    emptyEl.innerHTML = emptyState({ icon: 'fa-location-dot', title: 'No saved addresses', message: 'Add an address to speed up your checkout process.' });
    return;
  }
  grid.classList.remove('hidden');
  emptyEl.classList.add('hidden');
  grid.innerHTML = MY_ADDRESSES.map(a => `
    <div class="bg-white rounded-2xl border ${a.is_default ? 'border-primary' : 'border-slate-100'} shadow-sm p-5 relative">
      ${a.is_default ? '<span class="badge badge-info absolute top-4 right-4">Default</span>' : ''}
      <p class="font-bold text-secondary mb-1">${escapeHtml(a.full_name)}</p>
      <p class="text-sm text-slate-500">${escapeHtml(a.address_line1)}${a.address_line2 ? ', ' + escapeHtml(a.address_line2) : ''}</p>
      <p class="text-sm text-slate-500">${escapeHtml(a.city)}, ${escapeHtml(a.state)} ${escapeHtml(a.pincode)}</p>
      <p class="text-sm text-slate-500 mb-3">${escapeHtml(a.country)}</p>
      <p class="text-sm text-slate-400 mb-4"><i class="fa-solid fa-phone mr-1.5"></i>${escapeHtml(a.phone)}</p>
      <div class="flex gap-2">
        <button class="edit-addr-btn text-xs font-semibold text-slate-500 hover:text-primary px-3 py-1.5 rounded-lg border border-slate-200" data-id="${a.id}"><i class="fa-solid fa-pen mr-1"></i>Edit</button>
        ${!a.is_default ? `<button class="default-addr-btn text-xs font-semibold text-slate-500 hover:text-primary px-3 py-1.5 rounded-lg border border-slate-200" data-id="${a.id}"><i class="fa-solid fa-star mr-1"></i>Set Default</button>` : ''}
        <button class="delete-addr-btn text-xs font-semibold text-danger hover:underline px-3 py-1.5" data-id="${a.id}"><i class="fa-solid fa-trash mr-1"></i>Delete</button>
      </div>
    </div>`).join('');

  grid.querySelectorAll('.edit-addr-btn').forEach(b => b.addEventListener('click', () => openModal(MY_ADDRESSES.find(a => a.id === b.dataset.id))));
  grid.querySelectorAll('.delete-addr-btn').forEach(b => b.addEventListener('click', () => deleteAddress(b.dataset.id)));
  grid.querySelectorAll('.default-addr-btn').forEach(b => b.addEventListener('click', () => setDefault(b.dataset.id)));
}

function clearForm() {
  ['addr-id','addr-full-name','addr-phone','addr-line1','addr-line2','addr-city','addr-state','addr-pincode'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('addr-country').value = 'United States';
  document.getElementById('addr-is-default').checked = false;
  document.querySelectorAll('#address-form .field-error').forEach(e => e.classList.add('hidden'));
  document.querySelectorAll('#address-form input').forEach(i => i.classList.remove('input-error'));
}

function openModal(address) {
  clearForm();
  document.getElementById('address-modal-title').textContent = address ? 'Edit Address' : 'Add New Address';
  if (address) {
    document.getElementById('addr-id').value = address.id;
    document.getElementById('addr-full-name').value = address.full_name;
    document.getElementById('addr-phone').value = address.phone;
    document.getElementById('addr-line1').value = address.address_line1;
    document.getElementById('addr-line2').value = address.address_line2 || '';
    document.getElementById('addr-city').value = address.city;
    document.getElementById('addr-state').value = address.state;
    document.getElementById('addr-pincode').value = address.pincode;
    document.getElementById('addr-country').value = address.country;
    document.getElementById('addr-is-default').checked = !!address.is_default;
  }
  document.getElementById('address-modal').classList.remove('hidden');
}

async function deleteAddress(id) {
  const ok = await confirmDialog({ title: 'Delete address?', message: 'This address will be permanently removed.', confirmText: 'Delete' });
  if (!ok) return;
  await window.Api.apiDelete('addresses', id);
  MY_ADDRESSES = MY_ADDRESSES.filter(a => a.id !== id);
  renderAddresses();
  toast('Address deleted.', 'success');
}

async function setDefault(id) {
  const user = window.Auth.currentUser();
  await Promise.all(MY_ADDRESSES.map(a => window.Api.apiPatch('addresses', a.id, { is_default: a.id === id })));
  MY_ADDRESSES = MY_ADDRESSES.map(a => ({ ...a, is_default: a.id === id }));
  renderAddresses();
  toast('Default address updated.', 'success');
}

async function initAddressesPage() {
  renderLayout('');
  if (!window.Auth.requireAuth()) return;
  renderAccountSidebar('addresses');

  const user = window.Auth.currentUser();
  const all = await window.Api.apiListAll('addresses');
  MY_ADDRESSES = all.filter(a => a.user_id === user.id).sort((a,b)=> (b.is_default?1:0) - (a.is_default?1:0));
  renderAddresses();

  document.getElementById('add-address-btn').addEventListener('click', () => openModal(null));
  document.getElementById('address-modal-close').addEventListener('click', () => document.getElementById('address-modal').classList.add('hidden'));

  document.getElementById('address-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fields = { full_name: 'addr-full-name', phone: 'addr-phone', address_line1: 'addr-line1', city: 'addr-city', state: 'addr-state', pincode: 'addr-pincode', country: 'addr-country' };
    let valid = true;
    const values = {};
    for (const [key, id] of Object.entries(fields)) {
      const input = document.getElementById(id);
      const val = input.value.trim();
      const errEl = input.parentElement.querySelector('.field-error');
      if (!val) { input.classList.add('input-error'); if(errEl){errEl.textContent = 'This field is required.'; errEl.classList.remove('hidden');} valid = false; }
      else if (key === 'phone' && !window.Auth.validatePhone(val)) { input.classList.add('input-error'); if(errEl){errEl.textContent='Please enter a valid phone number.'; errEl.classList.remove('hidden');} valid = false; }
      else { input.classList.remove('input-error'); if(errEl) errEl.classList.add('hidden'); }
      values[key] = val;
    }
    if (!valid) return;

    const id = document.getElementById('addr-id').value;
    const isDefault = document.getElementById('addr-is-default').checked;
    const address_line2 = document.getElementById('addr-line2').value.trim();
    const user = window.Auth.currentUser();
    const payload = { ...values, address_line2, is_default: isDefault, user_id: user.id, type: 'shipping' };

    try {
      if (isDefault) await Promise.all(MY_ADDRESSES.filter(a => a.id !== id).map(a => window.Api.apiPatch('addresses', a.id, { is_default: false })));
      if (id) {
        const updated = await window.Api.apiUpdate('addresses', id, payload);
        MY_ADDRESSES = MY_ADDRESSES.map(a => a.id === id ? updated : (isDefault ? { ...a, is_default: false } : a));
      } else {
        const created = await window.Api.apiCreate('addresses', payload);
        MY_ADDRESSES = [...(isDefault ? MY_ADDRESSES.map(a => ({...a, is_default:false})) : MY_ADDRESSES), created];
      }
      document.getElementById('address-modal').classList.add('hidden');
      renderAddresses();
      toast('Address saved successfully.', 'success');
    } catch (err) { toast(err.message || 'Failed to save address.', 'error'); }
  });
}

initAddressesPage();
</script>
